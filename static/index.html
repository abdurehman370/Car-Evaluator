<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubizzle Premium Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d4d;
            --secondary: #2d3436;
            --accent: #00cec9;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #ff4d4d, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .search-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }

        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.2);
        }

        .btn-search {
            background: linear-gradient(90deg, #ff4d4d, #f97316);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 77, 77, 0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        .btn-search:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .car-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .car-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 77, 77, 0.3);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            color: var(--text);
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .card-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .location {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.75rem;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            grid-column: 1 / -1;
            padding: 4rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: #64748b;
        }

        .evaluation-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(0, 206, 201, 0.1), rgba(0, 206, 201, 0.05));
            border: 1px solid rgba(0, 206, 201, 0.2);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .eval-item {
            text-align: center;
        }

        .eval-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .eval-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .eval-robust {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 2rem; }
            .search-panel { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dubizzle Premium Scraper</h1>
            <p class="subtitle">Search 40,000+ used cars in UAE using official API</p>
        </header>

        <section class="search-panel">
            <form id="scrape-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Make</label>
                        <input type="text" id="make" placeholder="e.g. toyota">
                    </div>
                    <div class="input-group">
                        <label>Model</label>
                        <input type="text" id="model" placeholder="e.g. camry">
                    </div>
                    <div class="input-group">
                        <label>Year Min</label>
                        <input type="number" id="year_min" placeholder="2018">
                    </div>
                    <div class="input-group">
                        <label>Year Max</label>
                        <input type="number" id="year_max" placeholder="2024">
                    </div>
                    <div class="input-group">
                        <label>Max Mileage (KM)</label>
                        <input type="number" id="mileage_max" placeholder="80000">
                    </div>
                    <div class="input-group">
                        <label>Pages to Scrape</label>
                        <select id="max_pages">
                            <option value="1">1 Page</option>
                            <option value="2">2 Pages</option>
                            <option value="5">5 Pages</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-search" id="submit-btn">
                    <span id="btn-text">Search Listings</span>
                </button>
            </form>
        </section>

        <div id="loading" class="loading-container">
            <span class="loader"></span>
            <p>Scanning Dubizzle Database...</p>
        </div>

        <div id="results-grid">
            <div class="empty-state">Enter filters above to start searching</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('scrape-form');
        const resultsGrid = document.getElementById('results-grid');
        const loader = document.getElementById('loading');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous results
            resultsGrid.innerHTML = '';
            loader.style.display = 'flex';
            submitBtn.disabled = true;

            const formData = {
                make: document.getElementById('make').value || null,
                model: document.getElementById('model').value || null,
                year_min: parseInt(document.getElementById('year_min').value) || null,
                year_max: parseInt(document.getElementById('year_max').value) || null,
                mileage_max: parseInt(document.getElementById('mileage_max').value) || null,
                max_pages: parseInt(document.getElementById('max_pages').value)
            };

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                loader.style.display = 'none';
                submitBtn.disabled = false;

                if (result.status === 'success' && result.data.length > 0) {
                    if (result.evaluation) {
                        renderEvaluation(result.evaluation);
                    }
                    renderResults(result.data);
                } else {
                    resultsGrid.innerHTML = '<div class="empty-state">No vehicles found matching your criteria</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                loader.style.display = 'none';
                submitBtn.disabled = false;
                resultsGrid.innerHTML = '<div class="empty-state" style="color: #ff4d4d">An error occurred while fetching data. Please try again.</div>';
            }
        });

        function renderEvaluation(eval) {
            const evalCard = document.createElement('div');
            evalCard.className = 'evaluation-card';
            
            evalCard.innerHTML = `
                <div class="eval-item">
                    <div class="eval-label">Average Market Price</div>
                    <div class="eval-value">${Math.round(eval.average_price).toLocaleString()} AED</div>
                    <div class="eval-robust">${eval.is_robust ? '✓ Filtered Outliers' : '⚠ Limited Data'}</div>
                </div>
                <div class="eval-item">
                    <div class="eval-label">Price Range</div>
                    <div class="eval-value">${Math.round(eval.min_price).toLocaleString()} - ${Math.round(eval.max_price).toLocaleString()}</div>
                    <div class="eval-label">Based on ${eval.total_evaluated} listings</div>
                </div>
            `;
            resultsGrid.appendChild(evalCard);
        }

        function renderResults(cars) {
            cars.forEach((car, index) => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-content" onclick="window.open('${car.listing_url}', '_blank')">
                        <div class="card-title">${car.title}</div>
                        <div class="card-price">${car.price.toLocaleString()} AED</div>
                        <div class="card-info">
                            <div class="info-item">📅 ${car.year}</div>
                            <div class="info-item">🛣️ ${car.mileage.toLocaleString()} KM</div>
                            <div class="info-item">🔩 ${car.variant || 'N/A'}</div>
                        </div>
                        <div class="location">📍 ${car.location}</div>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
